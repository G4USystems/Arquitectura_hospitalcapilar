# =============================================
# Hospital Capilar Platform - Netlify Configuration
# Single site: Quiz at / and Dashboard at /dashboard/
# =============================================

[build]
  base = "."
  command = "cd packages/shared && npm install && cd ../quiz && npm install && npm run build && cd ../dashboard && npm install && VITE_BASE_PATH=/dashboard/ npm run build && mkdir -p ../quiz/dist/dashboard && cp -r dist/* ../quiz/dist/dashboard/"
  publish = "packages/quiz/dist"

[build.environment]
  NODE_VERSION = "20"

# Dashboard SPA - must come BEFORE the catch-all
[[redirects]]
  from = "/dashboard/*"
  to = "/dashboard/index.html"
  status = 200

# Quiz SPA - catch-all
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
