# =============================================
# Hospital Capilar — Quiz Netlify Configuration
# =============================================

[build]
  base = "."
  command = "cd packages/shared && npm install && cd ../quiz && npm install && npm run build"
  publish = "packages/quiz/dist"

[build.environment]
  NODE_VERSION = "20"

# PostHog reverse proxy — bypasses adblockers
[[redirects]]
  from = "/ingest/static/*"
  to = "https://eu-assets.i.posthog.com/static/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ingest/*"
  to = "https://eu.i.posthog.com/:splat"
  status = 200
  force = true
